# /var/xcesp/cfg/xcespwdog.ini — xcespwdog production configuration
# xcespwdog supervises xcespserver and xcespproc.
# Run via:  systemctl start xcesp
#
# xcespproc process entries are auto-generated at start time by xcesp-activate
# based on:  xcespserver.conf  →  server N / processes routing / count M
# The generated entries are written to PROC_CONFIG_FILE before xcespwdog starts.

[WDOG]
# xcespwdog is the central log collector for the whole stack
LOG_CONSOLE_ENABLED     = true
LOG_CONSOLE_LEVEL       = Info
LOG_FILE_ENABLED        = true
LOG_FILE                = /var/xcesp/log/xcesp.log
LOG_FILE_LEVEL          = Info
# LOG_FILE_CLEANSTART   = false  (true = truncate log on each start)

# UDP syslog listener: xcespserver and xcespproc forward their logs here
LOG_LOCAL_PORT          = 1514

# xcespproc process list is generated here at each start by xcesp-activate
PROC_CONFIG_FILE        = /run/xcesp/xcespwdog_proc.ini

# process.1 — xcespserver: no heartbeat timers (server runs until told to stop)
[process.1]
WDOG_LAUNCH             = /usr/bin/xcespserver --config /var/xcesp/cfg/xcespserver.ini
WDOG_START_TIMER        = 0
WDOG_INTERVAL_TIMER     = 0
WDOG_RESPAWN            = true
WDOG_RESPAWN_MAXCOUNT   = 3
