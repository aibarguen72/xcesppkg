# /var/xcesp/cfg/xcespproc.ini — xcespproc production configuration
# Shared by all xcespproc instances (-i N selects the affinity at runtime).

[PROC]
LOG_CONSOLE_ENABLED     = false
LOG_CONSOLE_LEVEL       = Info

# Logging forwarded to xcespwdog via UDP syslog; xcespwdog writes to file
LOG_LOCAL_ENABLE        = true
LOG_LOCAL_PORT          = 1514

# Scheduler tuning
PROC_HB_INTERVAL        = 1000
PROC_MAX_OBJECTS_PER_HB = 10
PROC_HB_INTERVAL_MULT   = 10

# CtrlLink: connect to xcespserver via Unix Domain Socket (namespace-safe)
# xcespproc will fall back to CTRL_HOST/CTRL_PORT if CTRL_SOCKET is absent
CTRL_SOCKET             = /run/xcesp/ctrl.sock
CTRL_HOST               = 127.0.0.1
CTRL_PORT               = 9900
CTRL_RETRY_INTERVAL     = 30000

# Event flush interval (ms): how often xcespproc forwards events to xcespserver
EVENT_FLUSH_INTERVAL    = 1000
