# /var/xcesp/cfg/xcespserver.conf — XCESP startup configuration
# This file uses xcespconfig format (Cisco-style blocks, '!' closes each block).
# Edit to match your network topology and replace the example below.
#
# Example: one router namespace with a loopback interface.
# Uncomment and adapt as needed.

# router <name>
#   affinity 1
#   no shutdown
#   vrf default
#     no shutdown
#     interface lo
#       device lo
#       type loopback
#       no shutdown
#       address 127.0.0.1/8
#     !
#   !
# !
