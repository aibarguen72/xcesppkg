# /var/xcesp/cfg/xcespserver.ini — xcespserver production configuration

[SERVER]
SCHEMA_DIR           = /var/xcesp/schema
RULES_DIR            = /var/xcesp/rules
CONFIG_FILE          = /var/xcesp/cfg/xcespserver.conf

# IPC: Unix Domain Socket (used by xcespproc — namespace-safe)
CONTROL_SOCKET       = /run/xcesp/ctrl.sock

# TCP control port (used by xcespcli for local/remote access)
CONTROL_ADDR         = 0.0.0.0
CONTROL_PORT         = 9900

# Tuning
STATUS_POLL_INTERVAL = 30
HEARTBEAT_TIMEOUT    = 120
DEPLOY_BATCH_SIZE    = 100

# Logging: console disabled; logs forwarded to xcespwdog via UDP syslog
LOG_CONSOLE_ENABLED  = false
LOG_LOCAL_ENABLE     = true
LOG_LOCAL_PORT       = 1514

[EVENTS]
DISPATCHER           = LOG
MAX_EVENTS           = 10000
; SNMP_HOST          = 127.0.0.1
; SNMP_PORT          = 162
; SNMP_COMMUNITY     = public
