# /var/xcesp/cfg/xcespserver.ini — xcespserver production configuration

[SERVER]
SCHEMA_DIR           = /var/xcesp/schema
RULES_DIR            = /var/xcesp/rules
CONFIG_FILE          = /var/xcesp/cfg/xcespserver.conf

# IPC: Unix Domain Socket (used by xcespproc — namespace-safe)
CONTROL_SOCKET       = /run/xcesp/ctrl.sock

# TCP control port (used by xcespcli for local/remote access)
CONTROL_ADDR         = 0.0.0.0
CONTROL_PORT         = 9900

# File storage (operator copy/delete/show operations)
DSK_DIR              = /var/xcesp/dsk

# Tuning
STATUS_POLL_INTERVAL = 30
HEARTBEAT_TIMEOUT    = 120
DEPLOY_BATCH_SIZE    = 100

# 0.2.2: AAA managed-users state file.  When set, xcespserver writes one
# line per configured `management/aaa/user` block here (with password
# hashes — mode 0600).  xcesp-activate reads this on every boot and
# materialises matching POSIX accounts in /etc/passwd + /etc/shadow,
# creates the xcespg1..xcespg4 groups, and (when sshd-integration=true
# in the running config) installs /etc/ssh/sshd_config.d/50-xcesp.conf.
# Leave commented out to disable the local-user feature entirely.
MANAGED_USERS_FILE   = /var/lib/xcesp/managed-users.state

# Logging: console disabled; logs forwarded to xcespwdog via UDP syslog
LOG_CONSOLE_ENABLED  = false
LOG_LOCAL_ENABLE     = true
LOG_LOCAL_PORT       = 1514

[DOC_HTTPD]
# Static user-manual HTTP server, supervised by xcespwdog.  When ENABLED,
# xcespserver emits an extra [process.N] entry into xcespwdog_gen.ini that
# launches `python3 -m http.server` against DOC_DIR.  Disabled or absent
# → no extra process.  BIND_ADDR defaults to 0.0.0.0 while the binding is
# INI-only; a future schema/CLI layer will flip the default to 127.0.0.1.
ENABLED   = true
BIND_ADDR = 0.0.0.0
PORT      = 8080
DOC_DIR   = /var/xcesp/doc

[EVENTS]
; DISPATCHER selects how xcespserver routes NodeEvents (interface
; LINK_UP / LINK_DOWN, alarm raise / clear, etc.).  Tri-state since
; 0.2.x:
;
;   AUTO  — pick SNMP iff any `management/snmp/trap-target N` instances
;           are configured; LOG otherwise.  Recommended.
;   LOG   — force log-only, ignore trap-targets.  No SNMP traps fire
;           even if trap-target instances exist (useful for staging
;           where the destinations are modelled in the config but the
;           operator doesn't want trap traffic yet).
;   SNMP  — force SNMP dispatch even with zero trap-target instances
;           (operators who manage snmpd trap2sink lines directly in
;           /etc/snmp/snmpd.conf rather than via XCESP CLI).
;
DISPATCHER           = AUTO
MAX_EVENTS           = 10000
; SNMP_HOST / SNMP_PORT / SNMP_COMMUNITY are legacy (pre-0.2.x raw-UDP
; trap delivery).  AgentX trap delivery uses the local snmpd master
; for forwarding; these knobs are ignored at runtime.
; SNMP_HOST          = 127.0.0.1
; SNMP_PORT          = 162
; SNMP_COMMUNITY     = public

; ---------------------------------------------------------------------------
; SNMP AgentX subagent (0.2.19+).  All settings are also configurable at
; runtime via the `management snmp ...` config block; values here are the
; defaults the schema engine uses when the operator hasn't overridden them.
;
; ENABLED is intentionally off by default — operator must explicitly set
; `management snmp enabled true` to start the subagent.
; ---------------------------------------------------------------------------
[SNMP]
; ENABLED         = false
; ENTERPRISE_OID  = 1.3.6.1.4.1.43978.1.1
; ENTERPRISE_NAME = XCESP-MIB
; AGENTX_SOCKET   = /var/agentx/master

; ---------------------------------------------------------------------------
; SOFTWARE upgrade (0.2.23+).
;
; LATEST_BASE_URL is the prefix that `copy sw latest backup-sw` uses to
; fetch the per-release MANIFEST.json + tarball.  Default points at the
; project's GitHub releases.  OEM rebuilds and on-prem mirrors override
; this to point at their own asset server.
;
; The release layout under <LATEST_BASE_URL> must be:
;
;   <LATEST_BASE_URL>/MANIFEST.json
;   <LATEST_BASE_URL>/<asset-name>            (referenced by MANIFEST.json)
;
; GitHub's /releases/latest/download/ URL auto-redirects to the newest
; release, so we never need to know the exact tag name.
; ---------------------------------------------------------------------------
[SOFTWARE]
LATEST_BASE_URL = https://github.com/aibarguen72/xcesppkg/releases/latest/download/
