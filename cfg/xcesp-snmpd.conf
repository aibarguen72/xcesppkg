# /etc/snmp/snmpd.conf.d/xcesp.conf — managed by xcesp-activate, do not edit
#
# Enable the AgentX master inside the system snmpd so xcespserver can
# register as a subagent.  When xcespserver starts (with
# `management snmp enabled true` in its running config), it connects to
# this Unix socket and registers handlers for its private MIB objects.
#
# agentXPerms <socket-mode> <dir-mode> <owner> <group>
#   0660 — socket mode: root + xcesp group can read/write.
#   0660 — directory mode for /var/agentx.
#   root xcesp — directory owner + group.  xcespserver runs in group xcesp.

master agentx
agentXSocket /var/agentx/master
agentXPerms 0660 0660 root xcesp
